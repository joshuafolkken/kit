pre-commit:
  parallel: true
  commands:
    prevent-main-commit:
      skip: git diff --cached --quiet
      run: pnpm prevent-main-commit

    audit:
      run: pnpm audit:security

    cspell:
      glob: '*.{ts,tsx,js,jsx,md,mdx,html,css,scss,yml,yaml,json}'
      run: pnpm exec cspell lint --no-must-find-files --no-progress {staged_files}

    prettier:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,html,css,scss,md,mdx,json,jsonc,yaml,yml}'
      run: pnpm exec prettier --check --ignore-unknown {staged_files}

    eslint:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: pnpm exec eslint --quiet --cache --cache-strategy content {staged_files}

    type-check:
      glob: '*.{ts,js,mjs,cjs}'
      run: pnpm check

  fail_text: |
    🚫 Commit blocked due to quality checks failure
    Please fix the issues above and try again.

    Quick fixes:
    • Run `pnpm run format` to auto-format code
    • Run `pnpm run lint` to check and fix linting issues
    • Run `pnpm run check` to verify TypeScript types

commit-msg:
  commands:
    check-commit-message:
      run: pnpm check-commit-message {1}

pre-push:
  parallel: false
  commands:
    test-unit:
      run: pnpm test:unit --run

  fail_text: |
    🚫 Push blocked due to build or test failures
    Please resolve the issues above before pushing.

    Troubleshooting:
    • Check build errors: `pnpm run build`
    • Run tests locally: `pnpm run test:unit` and `pnpm run test:e2e`
